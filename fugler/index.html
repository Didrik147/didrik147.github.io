<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuglekort</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card-grid">

  <!-- Card -->
  <div class="card bg-yellow-light">

    <!-- Cost -->
    <div class="circle bg-yellow-dark text-white">2</div>

    <!-- Name -->
    <h1 class="text-center bg-yellow-dark">Skjære</h1>

    <!-- Image -->
    <img src="./bilder/Skjære.jpg" alt="Skjære">

    <!-- Abilities -->
    <div class="abilities">
      <ul>
        <li>Når denne fuglen kommer i spill, trekk 1 kort.</li>
      </ul>
    </div>
    
    <!-- Flavor text -->
    <p class="flavor">
      En utpreget standfugl som beveger seg lite i løpet av året.
    </p>
    
  </div>

  </div>


  <script src="script.js"></script>
</body>
</html>
