<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuglekort</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="m-2 p-2">
  <!-- Card -->
  <div class="bg-[#d7a842cc] rounded-md border-solid border-4 border-black w-[2.5in] h-[3.5in]">
    <h1 class="font-bold text-lg text-center">Skjære</h1>
    <img src="./bilder/Skjære.jpg" class="w-full h-[150px] object-cover" alt="Skjære">
    <!-- Abilities -->
    <div class="px-1 py-2 text-xs h-[110px]">
      <ul class="list-disc mx-5">
        <li>Når denne fuglen kommer i spill, trekk 1 kort.</li>
      </ul>
    </div>
    <!-- Flavor text -->
    <div class="p-2 text-[8px] italic border-t border-black">
      En utpreget standfugl som beveger seg lite i løpet av året.
    </div>
  </div>
</body>
</html>
